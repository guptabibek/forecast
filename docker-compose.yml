services:
  api:
    build:
      context: .
      dockerfile: Dockerfile
      target: api-runtime
    restart: unless-stopped
    environment:
      NODE_ENV: ${NODE_ENV:-development}
      API_PORT: 3000
      DATABASE_URL: ${DATABASE_URL:-postgresql://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD:-postgres}@postgres:5432/${POSTGRES_DB:-forecast_saas}?schema=public}
      REDIS_URL: ${REDIS_URL:-}
      JWT_SECRET: ${JWT_SECRET}
      JWT_REFRESH_SECRET: ${JWT_REFRESH_SECRET}
      JWT_EXPIRES_IN: ${JWT_EXPIRES_IN:-15m}
      REFRESH_TOKEN_DAYS: ${REFRESH_TOKEN_DAYS:-7}
      ENCRYPTION_KEY: ${ENCRYPTION_KEY:-12345678901234567890123456789012}
      MAIN_DOMAIN: ${MAIN_DOMAIN:-localhost}
      # AI reporting is per-tenant: module gated by superadmin via
      # tenant_modules, operational config (timeouts/limits/flags) lives in
      # ai_tenant_provider_configs. Only the encryption key remains in env.
      AI_CONFIG_ENCRYPTION_KEY: ${AI_CONFIG_ENCRYPTION_KEY:-}
      AI_SEMANTIC_CATALOG_PATH: ${AI_SEMANTIC_CATALOG_PATH:-/app/ai-reporting/semantic-catalog.json}
      SMTP_HOST: ${SMTP_HOST:-}
      SMTP_PORT: ${SMTP_PORT:-587}
      SMTP_USER: ${SMTP_USER:-}
      SMTP_PASS: ${SMTP_PASS:-}
      SMTP_FROM: ${SMTP_FROM:-}
      SMTP_SECURE: ${SMTP_SECURE:-false}
      SMTP_REQUIRE_TLS: ${SMTP_REQUIRE_TLS:-false}
      SMTP_IGNORE_TLS: ${SMTP_IGNORE_TLS:-false}
      SMTP_TLS_REJECT_UNAUTHORIZED: ${SMTP_TLS_REJECT_UNAUTHORIZED:-true}
      MARG_HTTP_TIMEOUT_MS: ${MARG_HTTP_TIMEOUT_MS:-30000}
      MARG_DATA_HTTP_TIMEOUT_MS: ${MARG_DATA_HTTP_TIMEOUT_MS:-120000}
      MARG_SYNC_MAX_PAGES: ${MARG_SYNC_MAX_PAGES:-500}
      # Resumable Marg pipeline — all clamped/defaulted in code; values set
      # here only when explicitly overridden in .env.docker. Compose's
      # explicit environment block whitelists which vars reach the
      # container, so every var the code reads via process.env must appear
      # below or it will silently fall back to the hardcoded default.
      MARG_STAGING_BATCH_SIZE: ${MARG_STAGING_BATCH_SIZE:-5000}
      MARG_TRANSFORM_BATCH_SIZE: ${MARG_TRANSFORM_BATCH_SIZE:-2000}
      MARG_PROJECTION_BATCH_SIZE: ${MARG_PROJECTION_BATCH_SIZE:-1000}
      MARG_DB_TX_TIMEOUT_MS: ${MARG_DB_TX_TIMEOUT_MS:-300000}
      MARG_ACCOUNTING_PROJECTION_TX_TIMEOUT_MS: ${MARG_ACCOUNTING_PROJECTION_TX_TIMEOUT_MS:-60000}
      MARG_SYNC_STALE_AFTER_MS: ${MARG_SYNC_STALE_AFTER_MS:-1800000}
      MARG_RAW_PAGE_STORAGE_DIR: ${MARG_RAW_PAGE_STORAGE_DIR:-/data/marg-raw-pages}
      THROTTLE_SHORT_LIMIT: ${THROTTLE_SHORT_LIMIT:-100}
      THROTTLE_MEDIUM_LIMIT: ${THROTTLE_MEDIUM_LIMIT:-500}
      THROTTLE_LONG_LIMIT: ${THROTTLE_LONG_LIMIT:-3000}
      TRUST_PROXY_HOPS: ${TRUST_PROXY_HOPS:-1}
      # Heap ceiling honored from .env.docker. The previous hardcoded
      # 1 GB ceiling was the actual cause of the JsonStringifier OOM —
      # a 50 MB encrypted Marg page decodes to a 200–500 MB JS object
      # which V8 cannot allocate inside 1 GB. Default to 8 GB; bump to
      # 12288 if the largest months still OOM.
      NODE_OPTIONS: ${NODE_OPTIONS:---max-old-space-size=8192}
    volumes:
      # Durable raw-page storage for the resumable Marg sync pipeline.
      # Bind-mount target must match MARG_RAW_PAGE_STORAGE_DIR. Without
      # this volume the pages live only inside the container's writable
      # layer and are wiped on every recreate — defeating /resume.
      - marg_raw_pages:/data/marg-raw-pages
    ports:
      - "${API_EXTERNAL_PORT:-3001}:3000"
    extra_hosts:
      - "host.docker.internal:host-gateway"
    healthcheck:
      test:
        - CMD-SHELL
        - >-
          node -e "require('http').get('http://127.0.0.1:3000/health/ready', (res) => process.exit(res.statusCode === 200 ? 0 : 1)).on('error', () => process.exit(1))"
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 40s

  web:
    build:
      context: .
      dockerfile: Dockerfile
      target: web-runtime
      args:
        VITE_API_URL: ${VITE_API_URL:-/api/v1}
    restart: unless-stopped
    depends_on:
      api:
        condition: service_healthy
    ports:
      - "${WEB_PORT:-3000}:80"

volumes:
  redis_data:
  # Docker-managed named volume for Marg raw-page payloads. Pages are
  # gzip-compressed; expect ~2–15 MB per page. For a million-record
  # backfill with 200+ pages allocate 5–10 GB headroom. The /raw-pages/cleanup
  # admin endpoint reclaims old sync directories.
  marg_raw_pages:
